# Project tooling configuration.
# Ruff is the single linter + formatter for this repository (replaces
# black/flake8/isort). Run `ruff format .` and `ruff check .` from the repo root.

[tool.ruff]
target-version = "py310"   # codebase uses `X | None` and `from __future__ import annotations`
line-length = 100
# .claude = tooling vendado de skills do Claude Code (não é código do projeto); lint só o nosso.
extend-exclude = ["outputs", "reports", "sumo", "public", ".venv", ".claude"]

[tool.ruff.lint]
# A pragmatic, high-signal rule set:
#   E/W  pycodestyle   F  pyflakes        I  import sorting
#   UP   pyupgrade     B  bugbear         C4 comprehensions   SIM simplify
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM"]
# E501 (line too long) is left to the formatter; long strings/URLs need not wrap.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Tests bootstrap sys.path before importing the package, so module-level
# imports legitimately appear after that setup (E402).
"tests/**" = ["B011", "E402"]

[tool.ruff.format]
docstring-code-format = true
