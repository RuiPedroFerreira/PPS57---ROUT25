# PPS57 - Restrições semafóricas para uso pelo C-ITS/V2X emulation/4

scenario_id: porto_boavista_base_v03_signal_policy_constraints

safety_constraints:
  min_green_s: 8
  max_green_extension_s: 12
  max_total_green_s: 55
  yellow_s: 3
  all_red_s: 1
  pedestrian_clearance_must_not_be_shortened: true
  never_skip_yellow_or_all_red: true
  max_consecutive_priority_interventions_per_tls: 2
  cooldown_after_priority_s: 90

priority_hierarchy:
  1: emergency_vehicle
  2: public_transport_high_delay
  3: public_transport_headway_recovery
  4: public_transport_nominal
  5: general_traffic

obu_request_policy:
  request_distance_m: 250
  request_eta_min_s: 8
  request_eta_max_s: 45
  delay_threshold_s: 60
  headway_deviation_threshold_s: 120
  request_refresh_s: 5

allowed_actions_for_mvp:
  - no_action
  - green_extension_5s
  - green_extension_10s
  - early_green_if_safe
  - reject_with_reason
  - reevaluate_next_cycle

reject_reasons:
  - violates_min_green
  - violates_pedestrian_clearance
  - emergency_vehicle_active
  - queue_spillback_on_conflict_movement
  - cooldown_active
  - request_eta_out_of_window
  - no_benefit_bus_already_expected_green
