scenario_set: pps57_ingolstadt_citywide_tsp_v1
metadata:
  city: Ingolstadt (DE)
  scope: city-wide — toda a rede sinalizada (não um corredor isolado)
  source_scenario: >
    TUM-VT/sumo_ingolstadt (Apache-2.0), dias-demo de 2023. Rede real
    ingolstadt_net.net.xml; procura motorizada calibrada por detetores
    (routes_<dia>_24h_det_calib); transporte público real via GTFS da INVG.
  measured_facts:
    n_tls: 123
    motorized_demand: calibrada por detetores (det_calib)
    public_transport: 59 linhas, 2138 viagens/dia, 418 paragens, horários GTFS reais
    conflict_matrix_coverage: >
      57.9% dos signal groups ligados autoritativamente (814/1407); 123/123 TLS
      endereçáveis (0 em fail-close total) após a correção do via->slot em
      network_binding. Onde a rede não tem foes, a Safety Layer fail-close.
    real_demand_window: >
      Histograma de partidas (2023-07-04): pico da manhã 07–08h (~19.5k/17.6k
      veh/h), segundo pico 13–14h (~19.5k/20.6k). Procura calibrada concentrada
      ~05–14h; após as 14h o dia cai para <500 veh/h, pelo que NÃO há pico da
      tarde representado neste dia — cenários vivem na janela 05–14h.
  reporting_lens_corridor: >
    Linha 11 — 25 interseções semaforizadas consecutivas (média 24.5 nas 123
    viagens/dia, rota estável). NÃO é uma simulação restrita: é a lente de
    atribuição causal limpa aplicada DENTRO da corrida city-wide. Lentes
    secundárias: Linha 70 (184 viagens/dia, 20 TLS) e Linha 51 (23 TLS).
  alignment_level: real_calibrated_thirdparty
  no_fabricated_data: >
    Nenhum cenário inventa procura, horários ou geometria. Cada cenário é uma
    FATIA real (dia × janela horária) dos dados calibrados. As situações
    operacionais (atraso de autocarro, bunching, pressão transversal, conflito
    multi-linha, conflito com emergência) EMERGEM da simulação e são medidas,
    não construídas — é a diferença face ao catálogo sintético da Boavista.
  method: >
    Em cada cenário corre-se o par baseline (sem TSP) vs tsp_actuation com seeds
    emparelhadas, sempre city-wide. KPIs reportados a DOIS níveis: (1) rede
    inteira (validade externa, escala) e (2) por linha, com destaque para a
    Linha 11 (atribuição causal). O bloco `corridor` do tsp_config fica
    DESLIGADO (o cap de recovery-debt somaria o débito de 123 TLS num só
    orçamento, sem sentido city-wide); o spillback-defer par-a-par a jusante
    mantém-se.

# ---------------------------------------------------------------------------
# CENÁRIOS = fatias reais (dia x janela). Todos city-wide.
# ---------------------------------------------------------------------------
scenarios:
  city_am_peak:
    day: 2023-07-04            # terça-feira (dia-demo com PT)
    window_s: [25200, 32400]   # 07:00–09:00
    description: Pico da manhã na rede inteira — o caso de demonstração central.
    realism_basis: >
      Pico real do histograma de partidas calibrado (07h e 08h são as duas horas
      mais carregadas do dia útil). Todas as 59 linhas em operação segundo o
      horário GTFS. Demand cooldown 300s antes do fim da janela para drenar
      backlog de inserção.
    kpi_focus:
      - bus_time_loss_citywide
      - bus_time_loss_line11        # lente de atribuição
      - general_traffic_delay
      - tsp_interventions_per_tls
      - safety_blocks
    expected_use: >
      Pergunta principal: quanto ganha o TP na rede inteira num pico real e
      quanto custa ao tráfego geral. Global + por linha.

  city_midday_offpeak:
    day: 2023-07-04
    window_s: [36000, 43200]   # 10:00–12:00
    description: Período intermédio fluido — teste de DISCIPLINA do motor.
    realism_basis: >
      Procura calibrada estável e mais baixa que o pico (10–12h ~15–16k veh/h),
      headways de autocarro mais espaçados. Poucos autocarros acumulam atraso
      semafórico.
    kpi_focus:
      - unnecessary_interventions
      - low_delay_regime
      - bus_headway_adherence
      - lateral_impact_near_zero
    expected_use: >
      Demonstrar que o motor intervém pouco e com impacto lateral nulo quando
      não há atraso a recuperar — em toda a rede, não só num corredor.

  city_pm_secondary_peak:
    day: 2023-07-04
    window_s: [46800, 54000]   # 13:00–15:00
    description: Segundo pico real (almoço/início de tarde) — robustez.
    realism_basis: >
      13h e 14h são o segundo pico do histograma calibrado; perfil de procura
      diferente do pico da manhã (mais equilibrado por sentido). Valida que os
      resultados não são específicos de uma única hora de ponta.
    kpi_focus:
      - bus_time_loss_citywide
      - robustness_vs_am_peak
      - general_traffic_delay
      - queue_spillback
    expected_use: >
      Confirmar que o ganho do TP se mantém num regime de procura distinto do
      pico da manhã.

  weekend_sunday:
    day: 2023-06-25            # domingo (dia-demo com PT)
    window_s: [36000, 50400]   # 10:00–14:00
    description: Domingo — regime real genuinamente diferente (procura e PT).
    realism_basis: >
      Dia-demo de domingo com a SUA própria procura calibrada e o SEU horário
      GTFS (frequências de autocarro reduzidas). Não é o dia útil reescalado: é
      um dia real distinto. Valida o algoritmo fora do padrão de semana.
    kpi_focus:
      - bus_time_loss_low_demand
      - intervention_rate_weekend
      - bus_headway_adherence
    expected_use: >
      Mostrar generalização a um regime real diferente sem qualquer fabricação
      de dados.

# ---------------------------------------------------------------------------
# LENTES DE VALIDAÇÃO = situações EMERGENTES medidas dentro dos cenários acima.
# Não são simulações separadas; são análises aplicadas às mesmas corridas.
# ---------------------------------------------------------------------------
validation_lenses:
  delayed_bus_emergent:
    applies_to: [city_am_peak, city_pm_secondary_peak]
    measures: >
      Identificar viagens cujo atraso face ao horário GTFS (até no stop) excede o
      limiar de pedido (schedule_delay >= 20s). Medir green_extension_effect e
      recuperação de atraso — atraso REAL emergente, não injetado.
    kpi:
      - schedule_delay_recovered_s
      - priority_request_rate
      - green_extension_effect

  bus_bunching_emergent:
    applies_to: [city_am_peak]
    measures: >
      Detetar pares da mesma linha com headway abaixo do nominal (bunching real
      emergente). Verificar a supressão de prioridade ao segundo autocarro.
    kpi:
      - headway_variability
      - second_bus_priority_suppression

  multi_line_conflict:
    applies_to: [city_am_peak, city_pm_secondary_peak]
    measures: >
      Nos TLS onde >1 linha de autocarro converge (emergente da topologia real),
      validar a arbitragem cost-aware quando dois pedidos conflituam. Análogo
      city-wide ao bunching, mas entre linhas.
    kpi:
      - conflicting_requests
      - reasoned_rejections
      - cross_street_penalty

  cross_traffic_pressure_emergent:
    applies_to: [city_am_peak]
    measures: >
      Nos TLS com forte procura transversal relativa à aproximação do autocarro,
      medir rejeições fundamentadas e custo nas filas laterais.
    kpi:
      - cross_street_queues
      - controller_rejections
      - bus_vs_general_tradeoff

  fail_closed_coverage:
    applies_to: [city_am_peak]
    measures: >
      Confirmar que o TSP só atua nos signal groups com matriz de conflitos
      autoritativa (57.9%) e fica fail-closed nos restantes — propriedade de
      segurança à escala da cidade. Reportar a cobertura por TLS.
    kpi:
      - actuated_vs_eligible_groups
      - safety_blocks_no_matrix
      - coverage_fraction_per_tls
