scenario_set: pps57_porto_boavista_base_v04
metadata:
  city: Porto
  corridor: Avenida da Boavista / Casa da Musica - Praca do Imperio - Castelo do Queijo
  alignment_level: controlled_sumo_base_proxy
  base_config: configs/sumo_scenario_base.json
  simulation_duration_s: 7200
  notes: >
    Catalogo de cenarios SUMO controlados, repetiveis e justificaveis. A rede
    nao importa topografia OSM nesta fase; a aproximacao ao real vem de uma
    geometria de corredor plausivel, headways tipo STCP, dwell times urbanos,
    procura relativa por eixo e eventos operacionais calibraveis.

scenarios:
  baseline_am_peak:
    description: Referencia operacional de ponta da manha sem eventos especiais.
    realism_basis: >
      Janela de 2 horas, eixo principal dominante, procura inbound mais forte e
      headways TP de 10-15 minutos sao plausiveis para uma arterial urbana de
      entrada na cidade. A procura usa o envelope operacional calibrado para
      evitar que a referencia central fique dominada por backlog de insercao
      SUMO; cenarios high/congested preservam o stress de saturacao.
    kpi_focus:
      - bus_time_loss
      - general_traffic_delay
      - queue_baseline
      - travel_time_variability
    expected_use: Baseline para comparar cenarios TSP/C-ITS e calibrar procura.

  baseline_off_peak:
    description: Referencia fora de ponta em regime mais fluido.
    realism_basis: >
      Procura geral reduzida e headways TP mais espacados representam periodos
      intermedios onde a prioridade semaforica deve intervir pouco.
    kpi_focus:
      - unnecessary_interventions
      - low_delay_regime
      - bus_headway
    expected_use: Detectar algoritmos que criam intervencoes sem necessidade.

  high_demand_corridor:
    description: Procura elevada no eixo Boavista.
    realism_basis: >
      Aumenta sobretudo o corredor principal, preservando transversais
      moderadas, para testar saturacao longitudinal sem confundir com incidente
      transversal.
    kpi_focus:
      - corridor_throughput
      - bus_time_loss
      - general_traffic_penalty
      - queue_growth
    expected_use: Avaliar se ganhos do TP compensam perdas no trafego geral.

  cross_traffic_pressure:
    description: Pressao transversal em Bessa e Praca do Imperio.
    realism_basis: >
      Algumas transversais podem ficar dominantes por escolas, servicos,
      estacionamento ou redistribuicao local; o cenario testa trade-offs reais
      entre corredor e ruas conflitantes.
    kpi_focus:
      - cross_street_queues
      - blocked_by_safety
      - controller_rejections
      - bus_vs_general_tradeoff
    expected_use: Validar rejeicoes fundamentadas e limites de impacto lateral.

  delayed_bus_westbound:
    description: Autocarro atrasado no sentido cidade para mar.
    realism_basis: >
      Dwell ligeiramente mais elevado em paragens intermédias e procura maior no
      sentido westbound criam atraso operacional observavel, sem injectar atraso
      artificial fora da simulacao.
    kpi_focus:
      - westbound_bus_delay
      - priority_request_rate
      - green_extension_effect
    expected_use: Validar prioridade em movimento westbound.

  delayed_bus_eastbound:
    description: Autocarro atrasado no sentido mar para cidade.
    realism_basis: >
      Espelha o caso westbound para evitar que o sistema seja calibrado apenas
      para um sentido do corredor.
    kpi_focus:
      - eastbound_bus_delay
      - priority_request_rate
      - early_green_effect
    expected_use: Validar simetria do algoritmo e mappings de fases.

  bunched_buses:
    description: Dois autocarros circulam demasiado proximos no mesmo sentido.
    realism_basis: >
      Headways irregulares sao comuns em corredores urbanos quando uma viagem
      perde tempo em paragens; offsets proximos simulam bunching operacional.
    kpi_focus:
      - headway_variability
      - bus_bunching
      - second_bus_priority_suppression
    expected_use: Separar prioridade por atraso real de prioridade cega ao TP.

  long_dwell_stop:
    description: Paragem critica com dwell time elevado em Serralves.
    realism_basis: >
      Tempos de 75-90 segundos representam carga elevada de passageiros,
      acessibilidade reduzida ou paragem bloqueada; isto separa atraso de
      paragem de atraso semaforico.
    kpi_focus:
      - dwell_induced_delay
      - schedule_delay
      - priority_effectiveness_limit
    expected_use: Verificar que TSP nao promete recuperar atraso que nao vem dos semaforos.

  incident_minor_road_queue:
    description: Fila anomala numa via secundaria junto a Serralves.
    realism_basis: >
      Aumento persistente de procura numa aproximacao secundaria simula uma
      perturbacao operacional local e pressiona a safety layer.
    kpi_focus:
      - minor_road_queue
      - safety_blocks
      - general_traffic_penalty
    expected_use: Validar decisao conservadora quando a prioridade agrava conflitos.

  emergency_vehicle_conflict:
    description: Veiculo de emergencia concorre com transporte publico.
    realism_basis: >
      Um evento pontual a meio da janela permite validar hierarquia de
      prioridades sem contaminar todos os KPIs de baseline.
    kpi_focus:
      - emergency_travel_time
      - priority_hierarchy
      - bus_priority_preemption
    expected_use: Confirmar emergencia acima de TP e trafego geral.

  baseline_pm_peak:
    description: Referencia de ponta da tarde com sentido cidade para mar dominante.
    realism_basis: >
      O regresso a casa em direcao a Matosinhos/Boavista inverte o sentido de
      maior procura face ao AM peak. Um cenario espelhado valida simetria do
      algoritmo e evita calibracao enviesada para apenas um sentido.
    kpi_focus:
      - pm_corridor_throughput
      - westbound_bus_delay
      - direction_symmetry
      - queue_baseline
    expected_use: Validar paridade do TSP entre AM e PM peaks.

  baseline_am_peak_low:
    description: Envelope inferior da ponta da manha.
    realism_basis: >
      Sem contagens reais, a procura central deve ser tratada como proxy. Este
      cenario reduz a procura em cerca de 15% para avaliar se as conclusoes
      dependem demasiado de uma unica hipotese.
    kpi_focus:
      - demand_uncertainty_low
      - travel_time_range
      - queue_range
    expected_use: Limite inferior para relatorios de sensibilidade.

  baseline_am_peak_high:
    description: Envelope superior da ponta da manha.
    realism_basis: >
      Aumenta a procura em cerca de 15% sem recorrer a calibradores
      sinteticos, expondo risco de spillback e saturacao quando a procura real
      estiver acima do proxy central.
    kpi_focus:
      - demand_uncertainty_high
      - queue_spillback_risk
      - travel_time_range
    expected_use: Limite superior para relatorios de sensibilidade.

  baseline_pm_peak_low:
    description: Envelope inferior da ponta da tarde.
    realism_basis: >
      Mantem o padrao direcional PM mas reduz a procura, permitindo comparar
      robustez do controlador quando o regresso da tarde e mais fraco.
    kpi_focus:
      - pm_uncertainty_low
      - direction_symmetry
      - queue_range
    expected_use: Limite inferior PM para relatorios de sensibilidade.

  baseline_pm_peak_high:
    description: Envelope superior da ponta da tarde.
    realism_basis: >
      Mantem o padrao direcional PM e aumenta a procura para testar se ganhos e
      penalizacoes se mantem quando a ponta da tarde fica perto da saturacao.
    kpi_focus:
      - pm_uncertainty_high
      - direction_symmetry
      - queue_spillback_risk
    expected_use: Limite superior PM para relatorios de sensibilidade.

  congested_am_peak:
    description: Pico da manha em regime saturado (grau de saturacao acima de 0.95).
    realism_basis: >
      Picos reais de uma arterial urbana frequentemente excedem capacidade em
      um ou ambos os sentidos. Algoritmos calibrados apenas em fluxo livre
      podem falhar quando a fila atinge o detector de jusante; o cenario expoe
      este risco antes de qualquer despliegue.
    kpi_focus:
      - saturated_corridor_throughput
      - tsp_under_saturation
      - queue_spillback
      - bus_time_loss
    expected_use: Stress-test do controlador sob saturacao realista.

  baseline_rainy_am_peak:
    description: Pico da manha sob chuva (friccao reduzida, condutores mais cautelosos).
    realism_basis: >
      Porto regista cerca de 150 dias chuvosos/ano. A chuva reduz friccao
      (decel max ~-15%), aumenta tempo de reacao (tau +0.2s) e reduz a
      velocidade desejada (speedFactor x0.88). Validar TSP em condicoes
      degradadas garante robustez fora do dia ideal.
    kpi_focus:
      - wet_road_travel_time
      - tsp_robustness
      - headway_reliability
      - queue_growth_under_rain
    expected_use: Verificar que ganhos do TSP nao colapsam em condicoes adversas.

  baseline_foggy_am_peak:
    description: Pico da manha com nevoeiro denso.
    realism_basis: >
      Nevoeiro denso reduz a velocidade percecionada como segura e aumenta o
      tempo de reacao. Sao condicoes ocasionais mas reais no Porto e expoem
      o algoritmo a um envelope de velocidades muito comprimido.
    kpi_focus:
      - low_visibility_travel_time
      - tsp_robustness_fog
      - speed_dispersion
    expected_use: Robustez do TSP em condicoes de visibilidade reduzida.

  baseline_winter_morning_am_peak:
    description: Pico da manha de inverno com piso frio.
    realism_basis: >
      Manhas frias trazem arranques mais lentos e gelo pontual em transversais
      menores. Penaliza sobretudo veiculos pesados, sem chegar ao impacto da
      chuva forte.
    kpi_focus:
      - cold_start_delay
      - tsp_robustness_winter
      - truck_acceleration_penalty
    expected_use: Validar pequena perda de ganhos do TSP em inverno frio.

  av_penetration_low:
    description: Penetracao baixa de veiculos automatizados (~10%).
    realism_basis: >
      A transicao para veiculos automatizados nao sera abrupta. Testar TSP em
      fleet mix de transicao identifica eventuais regressoes antes do
      despliegue real.
    kpi_focus:
      - av_low_penetration_throughput
      - headway_smoothing
      - tsp_with_av
    expected_use: Avaliar relevancia do TSP em fleet mix de transicao inicial.

  av_penetration_medium:
    description: Penetracao media de veiculos automatizados (~30%).
    realism_basis: >
      Cenario realista para projecoes 2030-2035 quando AVs ja representam uma
      fraccao significativa do trafego urbano.
    kpi_focus:
      - av_mid_penetration_throughput
      - tsp_smoothing
      - queue_reduction
    expected_use: Avaliar como TSP ganha (ou perde) quando AVs ja suavizam o trafego.

  av_penetration_high:
    description: Penetracao alta de veiculos automatizados (~60%).
    realism_basis: >
      Cenario de longo prazo onde AVs dominam o trafego. Necessario validar
      que o TSP nao se torna contraproducente nem interfere com platooning
      automatico.
    kpi_focus:
      - av_high_penetration_throughput
      - tsp_vs_av_coordination
      - controller_relevance
    expected_use: Confirmar que TSP nao penaliza coordenacao automatica.

  stochastic_incidents_am_peak:
    description: Pico da manha com incidentes probabilisticos (paragens de veiculo).
    realism_basis: >
      Incidentes reais sao estocasticos. Cenarios deterministicos inflate
      confianca. A materializacao via random_seed garante que cada replicacao
      ve um padrao diferente, validando a robustez do algoritmo.
    kpi_focus:
      - incident_recovery_time
      - tsp_under_random_disturbance
      - headway_variability
    expected_use: Stress-test do TSP a perturbacoes aleatorias.
