scenario_set: pps57_porto_boavista_tsp_demo_v05
metadata:
  city: Porto
  corridor: Avenida da Boavista / Casa da Música - Praça do Império - Castelo do Queijo
  alignment_level: controlled_sumo_base_proxy
  base_config: configs/sumo_scenario_base.json
  simulation_duration_s: 7200
  notes: >
    Catálogo orientado à demonstração do impacto do TSP decision engine. Cada
    cenário é uma situação operacional distinta; o impacto mede-se dentro do
    próprio cenário, comparando o par baseline (sem TSP) vs tsp_actuation com
    seeds emparelhadas. Toda a procura deriva do envelope am_peak calibrado
    (HCM) por factores de escala; nenhum cenário introduz números de procura
    sem origem rastreável. Substitui o catálogo v04 de validação/sensibilidade
    (envelopes low/high, meteorologia, penetração AV, incidentes estocásticos),
    cujos perfis foram removidos junto com a fase de validação.

scenarios:
  baseline_am_peak:
    description: Ponta da manhã típica sem eventos especiais - o caso de demonstração central.
    realism_basis: >
      Janela de 2 horas, eixo principal dominante, procura inbound mais forte e
      headways TP de 10-15 minutos plausíveis para uma arterial urbana de
      entrada na cidade. Usa o envelope operacional calibrado para que a
      referência não fique dominada por backlog de inserção SUMO.
    kpi_focus:
      - bus_time_loss
      - general_traffic_delay
      - queue_baseline
      - travel_time_variability
    expected_use: >
      Resposta à pergunta principal da demo: quanto ganha o TP num pico normal
      e quanto custa ao tráfego geral.

  baseline_off_peak:
    description: Fora de ponta em regime fluido - o TSP deve intervir pouco.
    realism_basis: >
      Procura geral reduzida e headways TP mais espaçados representam períodos
      intermédios onde os autocarros raramente acumulam atraso semafórico.
    kpi_focus:
      - unnecessary_interventions
      - low_delay_regime
      - bus_headway
    expected_use: >
      Demonstrar disciplina do motor de decisão: poucas intervenções e impacto
      lateral nulo quando não há atraso a recuperar.

  congested_am_peak:
    description: Pico saturado (grau de saturação perto de 0.95) - stress-test do TSP.
    realism_basis: >
      Picos reais de uma arterial urbana excedem frequentemente a capacidade
      num ou em ambos os sentidos. Com filas a atingir os detectores de
      jusante, extensões de verde têm custo real nas transversais.
    kpi_focus:
      - tsp_under_saturation
      - bus_time_loss
      - general_traffic_penalty
      - queue_spillback
    expected_use: >
      Mostrar se os ganhos do TP sobrevivem à saturação e a que custo; região
      onde a safety layer deve bloquear mais pedidos.

  cross_traffic_pressure:
    description: Pressão transversal em Bessa e Praça do Império.
    realism_basis: >
      Transversais podem ficar dominantes por escolas, serviços ou
      redistribuição local; o cenário cria conflito directo entre prioridade ao
      corredor e filas laterais.
    kpi_focus:
      - cross_street_queues
      - blocked_by_safety
      - controller_rejections
      - bus_vs_general_tradeoff
    expected_use: >
      Demonstrar rejeições fundamentadas: o valor do motor está tanto no que
      recusa como no que concede.

  delayed_bus_westbound:
    description: Autocarro atrasado no sentido cidade-mar - o caso canónico de TSP.
    realism_basis: >
      Dwell mais elevado em paragens intermédias e procura maior no sentido
      westbound criam atraso operacional observável dentro da simulação, sem
      injectar atraso artificial externo.
    kpi_focus:
      - westbound_bus_delay
      - priority_request_rate
      - green_extension_effect
    expected_use: >
      Mostrar o mecanismo central: atraso real gera pedidos, pedidos geram
      extensões de verde, extensões recuperam parte do atraso.

  bunched_buses:
    description: Dois autocarros demasiado próximos no mesmo sentido.
    realism_basis: >
      Headways irregulares são comuns em corredores urbanos quando uma viagem
      perde tempo em paragens; offsets próximos reproduzem bunching
      operacional.
    kpi_focus:
      - headway_variability
      - bus_bunching
      - second_bus_priority_suppression
    expected_use: >
      Demonstrar que a prioridade distingue atraso real de simples proximidade:
      dar verde ao segundo autocarro agrava o bunching.

  emergency_vehicle_conflict:
    description: Veículo de emergência concorre com transporte público.
    realism_basis: >
      Um evento determinístico a meio da janela permite validar a hierarquia de
      prioridades sem contaminar os KPIs do resto do período.
    kpi_focus:
      - emergency_travel_time
      - priority_hierarchy
      - bus_priority_preemption
    expected_use: >
      Demonstrar a hierarquia emergência > TP > tráfego geral num único
      episódio observável.

  congested_delayed_bus:
    description: Autocarro atrasado num corredor saturado - onde a prioridade vale mais e custa mais.
    realism_basis: >
      Combina a procura saturada de congested_am_peak com os overrides de
      serviço e dwell calibrados de delayed_bus_westbound; não introduz novos
      números de procura. É a intersecção dos dois regimes já justificados.
    kpi_focus:
      - bus_time_loss_under_saturation
      - green_extension_effect
      - general_traffic_penalty
      - queue_spillback
    expected_use: >
      Cenário de fronteira da demo: máximo valor potencial do TSP contra
      máximo risco de penalizar o resto da rede.
